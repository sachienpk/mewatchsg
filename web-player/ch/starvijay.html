    <script>

<!-- Include Radiant Media Player - here we use the optimised build for Shaka player -->
<script src="https://cdn.radiantmediatechs.com/rmp/8.4.10/js/rmp-shaka.min.js"></script>
<!-- Player container element -->
<div id="rmp"></div>
<!-- Set up player configuration options -->
<script>
// Here we pass our MPEG-DASH streaming source
const src = {
  dash: 'https://linearjitp-playback.astro.com.my/dash-wv/linear/2311/default_ott.mpd',
};
const settings = {
  licenseKey: 'https://ck-dash-mpd.astradamy.com/dash-ck/linear/2311',
  src: src,
  width: 640,
  height: 360,
  // Here we need to state that MPEG-DASH is preferred over HLS, when both are available on the device
  dashFirst: true,
  contentMetadata: {
    poster: [
      'https://divign0fdw3sv.cloudfront.net/Images/ChannelLogo/contenthub/297_144.png'
    ]
  }
};
const rmp = new RadiantMP('rmp');
rmp.init(settings);
</script>
    <script src="../assets/js/jquery.min.js"></script>
    <script src="../assets/bootstrap/js/bootstrap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
    <script src="../assets/js/shaka-player.compiled.js"></script>
    <script src="../assets/js/shaka-player.ui.js"></script>
</body>
